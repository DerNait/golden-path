services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - golden-path-vendor:/var/www/vendor
    environment:
      TZ: ${APP_TIMEZONE:-America/Guatemala}
    depends_on:
      mysql:
        condition: service_healthy
    networks: [golden-path]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [golden-path]

  mysql:
    image: mysql:8.4
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-golden_path}
      MYSQL_USER: ${DB_USERNAME:-golden}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
      TZ: ${APP_TIMEZONE:-America/Guatemala}
    volumes:
      - golden-path-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [golden-path]

  node:
    image: node:22-alpine
    working_dir: /var/www
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www
      - golden-path-node-modules:/var/www/node_modules
    environment:
      VITE_APP_NAME: ${APP_NAME:-Golden Path}
      VITE_DEV_SERVER_URL: http://localhost:${VITE_PORT:-5173}
    networks: [golden-path]

networks:
  golden-path:
    driver: bridge

volumes:
  golden-path-mysql:
  golden-path-node-modules:
  golden-path-vendor:
