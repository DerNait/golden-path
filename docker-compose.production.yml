name: golden-path

services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE must identify the prepared Golden Path image}
    container_name: golden-path-app
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Guatemala}
      APP_LOCALE: ${APP_LOCALE:-es}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-es}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-single}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_ENCRYPT: ${SESSION_ENCRYPT:-true}
      SESSION_PATH: ${SESSION_PATH:-/}
      SESSION_DOMAIN: ${SESSION_DOMAIN}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      SESSION_HTTP_ONLY: ${SESSION_HTTP_ONLY:-true}
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-log}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      PERSONAL_USER_NAME: ${PERSONAL_USER_NAME}
      PERSONAL_USER_EMAIL: ${PERSONAL_USER_EMAIL}
      PERSONAL_USER_PASSWORD: ${PERSONAL_USER_PASSWORD}
    working_dir: /var/www
    volumes:
      - ${PRODUCTION_ROOT:-/var/www/golden-path}/shared/storage:/var/www/storage
      - ${PRODUCTION_ROOT:-/var/www/golden-path}/shared/bootstrap/cache:/var/www/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [golden-path]

  nginx:
    image: nginx:1.27-alpine
    container_name: golden-path-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8320:80"
    volumes:
      - ${PRODUCTION_ROOT:-/var/www/golden-path}/current/public:/var/www/public:ro
      - ${PRODUCTION_ROOT:-/var/www/golden-path}/shared/storage/app/public:/var/www/public/storage:ro
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
    tmpfs:
      - /var/cache/nginx
      - /var/run
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [golden-path]

  mysql:
    image: mysql:8.4
    container_name: golden-path-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: ${APP_TIMEZONE:-America/Guatemala}
    volumes:
      - golden-path-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks: [golden-path]

networks:
  golden-path:
    driver: bridge

volumes:
  golden-path-mysql-data:
    name: golden-path-mysql-data
